<html lang="ru"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Выбор проекта</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #070709;
            color: white;
            min-height: 100vh;
            padding: 80px 20px 30px 20px;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        .container {
            flex: 1;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(120, 80, 200, 0.08) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(60, 120, 220, 0.06) 0%, transparent 40%);
            pointer-events: none;
            z-index: -1;
            animation: bgMove 25s ease-in-out infinite alternate;
        }

        @keyframes bgMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 20px); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 70px;
        }

        .header h1 {
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 14px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 15px;
        }

        .header .line {
            width: 120px;
            height: 1px;
            background: rgba(255,255,255,0.1);
            margin: 0 auto;
        }

        .projects-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-item {
            position: relative;
            height: 130px;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
            opacity: 0.85;
            border: 1px solid rgba(255,255,255,0.04);
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .project-item:hover {
            height: 170px;
            opacity: 1;
            transform: scale(1.02);
            z-index: 10;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px rgba(255,255,255,0.1);
        }

        .project-bg {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center 20%;
            filter: brightness(0.35) saturate(0.7);
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .project-item:hover .project-bg {
            filter: brightness(0.55) saturate(1);
            transform: scale(1.08);
        }

        .project-content {
            position: relative;
            z-index: 2;
            height: 100%;
            padding: 0 50px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .project-info {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .project-status {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 5px;
            font-weight: 500;
        }

        .status-done {
            color: #5cc472;
        }

        .status-dev {
            color: #e84848;
        }

        .status-beta {
            color: #e6b045;
        }

        .project-name {
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .project-desc {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            max-width: 400px;
        }

        .project-action {
            padding: 14px 36px;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 8px;
            color: white;
            font-size: 11px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            transition: all 0.25s cubic-bezier(0.25, 1, 0.5, 1);
            backdrop-filter: blur(8px);
            position: relative;
            overflow: hidden;
        }

        .project-action::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: left 0.6s ease;
        }

        .project-action:hover {
            background: rgba(255,255,255,0.12);
            border-color: rgba(255,255,255,0.25);
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .project-action:hover::before {
            left: 100%;
        }

        .project-action:active {
            transform: translateY(0);
        }

        .project-item:hover .project-action {
            transform: translateY(0) scale(1.05);
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.06);
            margin: 20px 0;
        }

        @media (max-width: 860px) {
            body {
                padding: 40px 15px;
            }

            .project-content {
                padding: 0 25px;
                flex-direction: column;
                justify-content: center;
                gap: 15px;
                text-align: center;
            }

            .project-name {
                font-size: 22px;
            }

            .project-item {
                height: 160px;
            }

            .project-item:hover {
                height: 160px;
                transform: none;
            }
        }

        .bg-overlay {
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 50% 0%, rgba(30, 30, 40, 0.3) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }


    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div class="container">

        <header class="header">
            <h1>Выберите проект</h1>
            <div class="line"></div>
        </header>

        <div class="projects-list">

            <div class="project-item">
                <div class="project-bg" style="background-image: url('https://i.ibb.co/23zx9nN0/photo-2026-04-25-15-13-57.jpg')"></div>
                <div class="project-content">
                    <div class="project-info">
                        <h3 class="project-name">Край Руин</h3>
                        <p class="project-desc">Классическая сборка с улучшенными механиками и оптимизацией</p>
                    </div>
                    <a href="part1/MenuKray.html" class="project-action" style="">Перейти</a>
                </div>
            </div>

        </div>

    </div>

    <!-- Футер с социальными сетями -->
    <footer style="margin-top: 80px; padding: 28px 30px; background: rgba(255, 255, 255, 0.02); border-radius: 16px; text-align: center; border: 1px solid rgba(255, 255, 255, 0.04); backdrop-filter: blur(12px); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15); position: relative; overflow: hidden;">
        
        <style>
            .footer-social {
                width: 44px;
                height: 44px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.04);
                display: inline-flex;
                align-items: center;
                justify-content: center;
                transition: all 0.35s cubic-bezier(0.25, 1, 0.5, 1);
                text-decoration: none;
                position: relative;
                overflow: hidden;
            }
            
            .footer-social::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(42, 171, 238, 0.1), transparent);
                transition: left 0.6s ease;
            }
            
            .footer-social:hover {
                background: rgba(42, 171, 238, 0.12);
                transform: translateY(-4px) scale(1.08);
                box-shadow: 0 12px 30px rgba(42, 171, 238, 0.2), 0 0 0 1px rgba(42, 171, 238, 0.3);
            }
            
            .footer-social:hover::before {
                left: 100%;
            }
            
            .footer-social svg {
                position: relative;
                z-index: 1;
                transition: transform 0.25s ease;
            }
            
            .footer-social:hover svg {
                transform: scale(1.15);
            }
        </style>
        
        <a href="https://t.me/Kotik53" target="_blank" class="footer-social">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#2AABEE">
                <path d="M12 0C5.37 0 0 5.37 0 12s5.37 12 12 12 12-5.37 12-12S18.63 0 12 0zm5.9 8.25c-.15 1.82-.92 6.22-1.3 8.26-.16.86-.5 1.15-.82 1.18-.69.06-1.22-.46-1.9-.9-1.05-.69-1.65-1.12-2.67-1.8-1.18-.78-.41-1.21.26-1.91.18-.18 3.24-2.97 3.3-3.23.01-.03.01-.15-.06-.21s-.17-.04-.25-.02c-.1.02-1.79 1.14-5.06 3.34-.48.33-.91.49-1.3.48-.43-.01-1.25-.24-1.86-.44-.75-.24-1.35-.37-1.3-.79.03-.23.34-.47.94-.71 3.68-1.52 6.13-2.53 7.36-3.02 3.51-1.4 4.25-1.65 4.73-1.66.1 0 .33.02.48.12.13.09.17.21.19.3.02.08.05.17.03.26z"/>
            </svg>
        </a>
        
        <p style="color: rgba(255, 255, 255, 0.22); font-size: 11px; margin-top: 16px; letter-spacing: 1px; font-weight: 400;">© 2026 Kotik53</p>
    </footer>

    <script>
        document.querySelectorAll('.project-action').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const originalText = btn.textContent;
                
                btn.textContent = '✓ Выбрано';
                btn.style.background = 'rgba(92, 196, 114, 0.2)';
                btn.style.borderColor = '#5cc472';
                
                setTimeout(() => {
                    btn.textContent = originalText;
                    btn.style.background = '';
                    btn.style.borderColor = '';
                }, 1800);
            });
        });
    </script>

</body></html>
